[tox]
envlist = py{310,311,312,313,314}-{linux,macos,windows}
isolated_build = true

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[gh-actions:env]
PLATFORM =
    ubuntu-latest: linux
    macos-14: macos
    macos-latest: macos
    windows-latest: windows

[testenv]
platform =
    macos: darwin
    linux: linux
    windows: win32
changedir = tests
passenv =
    CI
    GITHUB_ACTIONS
    CC
    CFLAGS
    LDFLAGS
    DYLD_LIBRARY_PATH
    PATH
    INCLUDE
    LIB
    DISTUTILS_USE_SDK
    MSSdk
extras =
    testing
deps =
    numpy>=2.0.0
    pytest
    pytest-cov
commands =
    # Debug
    python -c "import sys; print('DEBUG: Probando import...'); import adamixture; print('DEBUG: Importacion EXITOSA')"
    pytest -v --color=yes --cov=adamixture --cov-report=xml --import-mode=importlib

